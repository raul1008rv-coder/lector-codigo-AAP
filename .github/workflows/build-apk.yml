name: Compilar APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el proyecto
        uses: actions/checkout@v4

      - name: Ver estructura del repo
        run: ls -R | head -120

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compilar el APK (debug)
        run: |
          PROJ=$(dirname "$(find . -name settings.gradle -o -name settings.gradle.kts | head -n1)")
          echo "Proyecto detectado en: $PROJ"
          cd "$PROJ"
          gradle assembleDebug --stacktrace

      - name: Publicar el APK como descarga
        uses: actions/upload-artifact@v4
        with:
          name: lector-aap-apk
          path: '**/app-debug.apk'
          if-no-files-found: error
