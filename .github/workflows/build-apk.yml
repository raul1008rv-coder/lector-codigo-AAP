name: Compilar APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el proyecto
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compilar el APK (debug)
        working-directory: LectorAAP
        run: gradle assembleDebug --stacktrace

      - name: Publicar el APK como descarga
        uses: actions/upload-artifact@v4
        with:
          name: lector-aap-apk
          path: LectorAAP/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
